document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yellow);\n  color: #000;\n  text-align: center;\n  padding: 40px;\n}\n#rotate-prompt .rp-phone {\n  width: 88px; height: 150px;\n  border: 6px solid #000;\n  border-radius: 16px;\n  position: relative;\n  animation: rpRotate 2.4s ease-in-out infinite;\n}\n#rotate-prompt .rp-phone::after {\n  content: \"\";\n  position: absolute;\n  bottom: 10px; left: 50%;\n  width: 30px; height: 4px;\n  background: #000;\n  border-radius: 3px;\n  transform: translateX(-50%);\n}\n#rotate-prompt .rp-title {\n  font-family: 'Anton', sans-serif;\n  font-size: 30px;\n  letter-spacing: 1px;\n  line-height: 1.1;\n  max-width: 340px;\n}\n#rotate-prompt .rp-sub {\n  font-size: 16px;\n  font-weight: 600;\n  opacity: 0.7;\n  max-width: 320px;\n}\n@keyframes rpRotate {\n  0%, 28%   { transform: rotate(0deg); }\n  60%, 78%  { transform: rotate(-90deg); }\n  100%      { transform: rotate(-90deg); }\n}\n@media (orientation: portrait) and (max-width: 1100px) {\n  #rotate-prompt { display: flex; }\n}\n\n#deck-viewport {\n  position: fixed;\n  inset: 0;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n#deck-stage {\n  width: 1920px;\n  height: 1080px;\n  position: relative;\n  transform-origin: top left;\n  overflow: hidden;\n}\n\n/* === SLIDE BASE === */\n.slide {\n  position: absolute;\n  inset: 0;\n  width: 1920px;\n  height: 1080px;\n  overflow: hidden;\n  opacity: 0;\n  visibility: hidden;\n  pointer-events: none;\n  transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1);\n  transform: translateX(60px);\n}\n.slide.active {\n  opacity: 1;\n  visibility: visible;\n  pointer-events: all;\n  transform: translateX(0);\n}\n.slide.exit {\n  opacity: 0;\n  transform: translateX(-60px);\n}\n\n/* === SLIDE BACKGROUNDS === */\n.slide-dark { background: var(--bg); }\n.slide-yellow { background: var(--yellow); }\n\n/* === TYPOGRAPHY === */\n.anton { font-family: 'Anton', sans-serif; font-weight: 400; }\n.section-label {\n  font-family: 'Anton', sans-serif;\n  font-size: 18px;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  color: var(--white);\n}\n.slide-yellow .section-label { color: #000; }\n\n.title-xl {\n  font-family: 'Anton', sans-serif;\n  font-size: 110px;\n  line-height: 1.0;\n  color: var(--white);\n  letter-spacing: -1px;\n}\n.title-lg {\n  font-family: 'Anton', sans-serif;\n  font-size: 76px;\n  line-height: 1.05;\n  color: var(--white);\n  letter-spacing: -0.5px;\n}\n.title-md {\n  font-family: 'Anton', sans-serif;\n  font-size: 54px;\n  line-height: 1.1;\n  color: var(--white);\n}\n.title-sm {\n  font-family: 'Anton', sans-serif;\n  font-size: 36px;\n  line-height: 1.15;\n  color: var(--white);\n}\n.slide-yellow .title-xl,\n.slide-yellow .title-lg,\n.slide-yellow .title-md { color: #000; }\n\n.body-text {\n  font-size: 22px;\n  line-height: 1.55;\n  color: var(--light-gray);\n}\n.body-sm { font-size: 18px; line-height: 1.5; color: var(--gray); }\n.body-xs { font-size: 15px; line-height: 1.5; color: var(--gray); }\n.accent { color: var(--yellow); }\n.white { color: var(--white); }\n\n/* === LAYOUT HELPERS === */\n.pad { padding: 80px 100px; }\n.pad-lg { padding: 70px 100px; }\n.flex { display: flex; }\n.flex-col { display: flex; flex-direction: column; }\n.gap-20 { gap: 20px; }\n.gap-30 { gap: 30px; }\n.gap-40 { gap: 40px; }\n.gap-50 { gap: 50px; }\n.items-start { align-items: flex-start; }\n.items-center { align-items: center; }\n.justify-between { justify-content: space-between; }\n\n/* === CARD === */\n.card {\n  background: var(--box);\n  border-radius: 16px;\n  padding: 40px 44px;\n  border-top: 3px solid var(--yellow);\n}\n.card-plain {\n  background: var(--box);\n  border-radius: 16px;\n  padding: 36px 40px;\n  border: 1px solid #333;\n}\n.card-number {\n  font-family: 'Anton', sans-serif;\n  font-size: 64px;\n  color: var(--yellow);\n  line-height: 1;\n}\n.card-title {\n  font-family: 'Anton', sans-serif;\n  font-size: 26px;\n  color: var(--white);\n  margin-bottom: 12px;\n}\n\n/* === BOTTOM BAR === */\n.bottom-bar {\n  position: absolute;\n  bottom: 0; left: 0; right: 0;\n  height: 2px;\n  background: #333;\n}\n.bottom-label {\n  position: absolute;\n  bottom: 20px; left: 100px;\n  font-size: 14px;\n  letter-spacing: 2px;\n  color: #555;\n  text-transform: uppercase;\n}\n\n/* === DIVIDER SLIDE (YELLOW CHAPTER) === */\n.chapter-slide {\n  padding: 80px 100px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  height: 100%;\n}\n.chapter-part {\n  font-family: 'Anton', sans-serif;\n  font-size: 18px;\n  letter-spacing: 4px;\n  color: #000;\n  text-transform: uppercase;\n  position: absolute;\n  top: 60px; left: 100px;\n}\n.chapter-year {\n  font-family: 'Anton', sans-serif;\n  font-size: 18px;\n  letter-spacing: 4px;\n  color: #000;\n  position: absolute;\n  top: 60px; right: 100px;\n}\n.chapter-num {\n  font-family: 'Anton', sans-serif;\n  font-size: 220px;\n  color: rgba(0,0,0,0.12);\n  position: absolute;\n  bottom: 60px; right: 80px;\n  line-height: 1;\n}\n.chapter-title {\n  font-family: 'Anton', sans-serif;\n  font-size: 130px;\n  color: #000;\n  line-height: 1;\n  margin-bottom: 20px;\n}\n.chapter-sub {\n  font-family: 'Anton', sans-serif;\n  font-size: 28px;\n  color: #1a1a1a;\n}\n\n/* === STEP TIMELINE === */\n.timeline {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  position: relative;\n  margin-top: 40px;\n}\n.timeline::before {\n  content: '';\n  position: absolute;\n  top: 52px;\n  left: 52px;\n  right: 52px;\n  height: 3px;\n  background: repeating-linear-gradient(to right, var(--yellow) 0, var(--yellow) 12px, transparent 12px, transparent 24px);\n}\n.step-item {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  flex: 1;\n  text-align: center;\n  z-index: 1;\n}\n.step-circle {\n  width: 104px;\n  height: 104px;\n  border-radius: 50%;\n  background: var(--yellow);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: 'Anton', sans-serif;\n  font-size: 44px;\n  color: #000;\n  margin-bottom: 24px;\n  flex-shrink: 0;\n}\n.step-title { font-family: 'Anton', sans-serif; font-size: 22px; color: var(--white); margin-bottom: 8px; }\n.step-sub { font-size: 16px; color: var(--gray); max-width: 180px; }\n\n/* === GRID 2-COL === */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }\n.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }\n\n/* === STAT CARD === */\n.stat-card {\n  background: var(--box);\n  border-radius: 16px;\n  padding: 44px;\n  border-top: 3px solid var(--yellow);\n}\n.stat-num {\n  font-family: 'Anton', sans-serif;\n  font-size: 86px;\n  color: var(--yellow);\n  line-height: 1;\n  margin-bottom: 12px;\n}\n.stat-label {\n  font-family: 'Anton', sans-serif;\n  font-size: 20px;\n  color: var(--white);\n  text-transform: uppercase;\n  letter-spacing: 2px;\n  margin-bottom: 10px;\n}\n\n/* === AGENDA === */\n.agenda-section-title {\n  font-family: 'Anton', sans-serif;\n  font-size: 26px;\n  color: var(--white);\n  margin-bottom: 4px;\n}\n.agenda-num {\n  font-family: 'Anton', sans-serif;\n  font-size: 26px;\n  color: var(--yellow);\n}\n.agenda-divider { border: none; border-top: 1px solid #333; margin: 10px 0; }\n.agenda-item { display: flex; justify-content: space-between; padding: 6px 0; }\n.agenda-item-num { color: var(--yellow); font-size: 17px; margin-right: 12px; }\n.agenda-item-text { color: var(--gray); font-size: 17px; }\n\n/* === NUMBERED ROW === */\n.num-row {\n  display: flex;\n  gap: 24px;\n  align-items: flex-start;\n  padding: 28px 36px;\n  background: var(--box);\n  border-radius: 14px;\n  border-left: 4px solid var(--yellow);\n  margin-bottom: 18px;\n}\n.num-row-n {\n  font-family: 'Anton', sans-serif;\n  font-size: 52px;\n  color: var(--yellow);\n  min-width: 50px;\n  line-height: 1;\n}\n.num-row-content .row-title {\n  font-family: 'Anton', sans-serif;\n  font-size: 24px;\n  color: var(--white);\n  margin-bottom: 4px;\n}\n.num-row-content .row-sub {\n  font-size: 17px;\n  color: var(--yellow);\n  font-style: italic;\n  margin-bottom: 6px;\n}\n.num-row-content .row-text { font-size: 17px; color: var(--gray); }\n\n/* === PROGRESS BAR === */\n.progress-row { margin-bottom: 32px; }\n.progress-label-row { display: flex; justify-content: space-between; margin-bottom: 10px; }\n.progress-bar-track { background: #333; border-radius: 4px; height: 12px; overflow: hidden; }\n.progress-bar-fill { height: 100%; background: var(--yellow); border-radius: 4px; width: 0; transition: width 1.2s ease; }\n\n/* === CHART CONTAINER === */\n.chart-wrap { position: relative; }\n\n/* === PILL BADGE === */\n.pill {\n  display: inline-block;\n  padding: 6px 18px;\n  border-radius: 40px;\n  font-size: 15px;\n  font-family: 'Anton', sans-serif;\n  letter-spacing: 1px;\n}\n.pill-yellow { background: var(--yellow); color: #000; }\n.pill-dark { background: #333; color: var(--white); }\n\n/* === COVER SLIDE SPECIFIC === */\n#slide-cover {\n  background: var(--yellow);\n}\n.cover-content {\n  position: absolute;\n  left: 100px;\n  bottom: 160px;\n}\n.cover-logo {\n  position: absolute;\n  top: 70px; left: 90px;\n  width: 120px; height: 120px;\n}\n.cover-logo-ring {\n  width: 120px; height: 120px;\n  background: #000;\n  border-radius: 20px;\n  display: flex; align-items: center; justify-content: center;\n  position: relative;\n  overflow: hidden;\n}\n.cover-logo-text {\n  font-family: 'Anton', sans-serif;\n  font-size: 28px;\n  color: var(--yellow);\n  letter-spacing: 2px;\n}\n.cover-deco {\n  position: absolute;\n  right: 0; top: 0;\n  width: 700px; height: 700px;\n  background: rgba(255,255,255,0.15);\n  border-radius: 50%;\n  transform: translate(200px, -200px);\n  pointer-events: none;\n}\n.cover-deco2 {\n  position: absolute;\n  right: 100px; top: 80px;\n  width: 480px; height: 480px;\n  background: rgba(255,255,255,0.1);\n  border-radius: 50%;\n  pointer-events: none;\n}\n\n/* === ANIMATIONS === */\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(30px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n@keyframes fadeIn {\n  from { opacity: 0; }\n  to { opacity: 1; }\n}\n@keyframes countUp {\n  from { opacity: 0; transform: scale(0.7); }\n  to { opacity: 1; transform: scale(1); }\n}\n@keyframes slideRight {\n  from { transform: scaleX(0); }\n  to { transform: scaleX(1); }\n}\n@keyframes pulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.03); }\n}\n\n.anim-1 { animation: fadeUp 0.6s ease forwards; }\n.anim-2 { animation: fadeUp 0.6s 0.15s ease both; }\n.anim-3 { animation: fadeUp 0.6s 0.3s ease both; }\n.anim-4 { animation: fadeUp 0.6s 0.45s ease both; }\n.anim-5 { animation: fadeUp 0.6s 0.6s ease both; }\n.anim-6 { animation: fadeUp 0.6s 0.75s ease both; }\n\n.slide:not(.active) .anim-1,\n.slide:not(.active) .anim-2,\n.slide:not(.active) .anim-3,\n.slide:not(.active) .anim-4,\n.slide:not(.active) .anim-5,\n.slide:not(.active) .anim-6 {\n  animation: none;\n  opacity: 0;\n}\n\n/* NAV DOTS */\n#nav-dots {\n  position: fixed;\n  bottom: 20px;\n  left: 50%;\n  transform: translateX(-50%);\n  display: flex;\n  gap: 6px;\n  z-index: 100;\n}\n.nav-dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.3);\n  cursor: pointer;\n  transition: background 0.3s, transform 0.3s;\n}\n.nav-dot.active {\n  background: var(--yellow);\n  transform: scale(1.4);\n}\n\n/* NAV ARROWS */\n.nav-arrow {\n  position: fixed;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 52px; height: 52px;\n  background: rgba(255,184,29,0.15);\n  border: 1px solid rgba(255,184,29,0.3);\n  border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  cursor: pointer;\n  z-index: 100;\n  transition: background 0.2s;\n  font-size: 22px;\n  color: var(--yellow);\n}\n.nav-arrow:hover { background: rgba(255,184,29,0.3); }\n#nav-prev { left: 16px; }\n#nav-next { right: 16px; }\n\n/* SLIDE COUNTER */\n  justify-content: center;\n}\n.img-zbtn.img-zfit { font-size: 12px; font-family: 'Anton', sans-serif; letter-spacing: 1px; background: #fff; }\n.img-zbtn:hover { filter: brightness(1.08); }\n.img-zbtn:active { transform: scale(0.94); }\nbody.editing .img-slot { outline: 1px dashed rgba(255,184,29,0.45); outline-offset: -1px; cursor: pointer; }\nbody.editing .img-slot:not(.has-img):hover .img-slot-ov { display: flex; }\n/* Always-visible replace button while editing, on every image area */\nbody.editing .img-slot .img-slot-rp { display: flex; }\nbody.editing .img-slot.has-img .img-slot-rm { display: flex; }\nbody.editing .img-slot.has-img:hover .img-slot-rz { display: block; }\nbody.editing .img-slot.has-img:hover .img-slot-zoom { display: flex; }\n/* Uploaded images are NOT clipped — they can grow beyond their frame. */\n.img-slot.has-img { overflow: visible; }\n.img-slot.has-img > img.slot-img { z-index: 2; }\n/* When a custom image is uploaded, hide whatever placeholder it replaces:\n   the cover-logo SVG, or the entire phone-mockup composition inside an area. */\n.img-slot.has-img > svg { visibility: hidden; }\n.img-slot.has-img > div:not(.img-slot-ov):not(.img-slot-rm):not(.img-slot-rp):not(.img-slot-rz):not(.img-slot-zoom) { visibility: hidden; }\n/* Empty cover drop zone — placeholder hint shown only while editing */\n.empty-zone-hint {\n  position: absolute; inset: 0;\n  display: none;\n  flex-direction: column; align-items: center; justify-content: center; gap: 14px;\n  border: 3px dashed rgba(0,0,0,0.35);\n  border-radius: inherit;\n  color: rgba(0,0,0,0.55);\n  text-align: center;\n  background: rgba(0,0,0,0.04);\n}\n.empty-zone-hint .ico { font-size: 56px; line-height: 1; }\n.empty-zone-hint .lbl { font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: 1px; line-height: 1.3; }\nbody.editing .img-slot[data-empty-zone]:not(.has-img) .empty-zone-hint { display: flex; }\nbody.editing .img-slot[data-empty-zone]:not(.has-img) { cursor: pointer; }\nb n-left:160px;\">you!<\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Contact info bottom right -->\n  <div class=\"anim-4\" style=\"position:absolute;bottom:100px;right:100px;text-align:right;\">\n    <div style=\"font-family:Anton,sans-serif;font-size:32px;color:var(--white);margin-bottom:12px;\">+1 (470) 642-9141<\u002Fdiv>\n    <div style=\"font-family:Anton,sans-serif;font-size:32px;color:var(--yellow);margin-bottom:12px;\">jc@josimar.dev<\u002Fdiv>\n    <div style=\"font-family:Anton,sans-serif;font-size:32px;color:var(--white);\">www.josimar.dev<\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Bottom bar -->\n  <div class=\"bottom-bar\"><\u002Fdiv>\n  <div class=\"bottom-label\" data-i18n=\"bottom_conf\">CONFIDENTIAL · KUATA INVESTOR DECK 2026<\u002Fdiv>\n<\u002Fdiv>\n\n  <\u002Fdiv><!-- /deck-stage -->\n<\u002Fdiv><!-- /deck-viewport -->\n\n\n<!-- EXPORT TOOLBAR -->\n<div id=\"export-toolbar\">\n  <button class=\"export-btn\" id=\"edit-btn\" onclick=\"toggleEdit()\" title=\"Edit text inline / Editar texto\">✎ Edit images &amp; text<\u002Fbutton>\n  <button class=\"export-btn\" id=\"clear-img-btn\" onclick=\"clearAllImages()\" title=\"Remove all images you added\">Clear Images<\u002Fbutton>\n  <button class=\"export-btn\" id=\"lang-btn\" onclick=\"toggleLang()\" title=\"Alternar idioma / Toggle language\">PT<\u002Fbutton>\n  <button class=\"export-btn\" id=\"pdf-btn\" onclick=\"exportPDF()\">↓ PDF<\u002Fbutton>\n  <button class=\"export-btn\" id=\"pptx-btn\" onclick=\"exportPPTX()\">↓ PPTX<\u002Fbutton>\n<\u002Fdiv>\n<!-- EDIT MODE HINT -->\n<div id=\"edit-hint\">Drag an image to move it · drag its corner to resize · ✕ to delete · drop a new image anywhere<\u002Fdiv>\n<!-- EXPORT OVERLAY -->\n<div id=\"export-overlay\">\n  <div class=\"eo-title\" id=\"eo-title\">EXPORTING<\u002Fdiv>\n  <div class=\"eo-sub\" id=\"eo-sub\">Preparing slides...<\u002Fdiv>\n  <div class=\"eo-bar-track\"><div class=\"eo-bar-fill\" id=\"eo-fill\"><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<!-- NAV -->\n<div id=\"nav-dots\"><\u002Fdiv>\n<div class=\"nav-arrow\" id=\"nav-prev\">←<\u002Fdiv>\n<div class=\"nav-arrow\" id=\"nav-next\">→<\u002Fdiv>\n<div id=\"slide-counter\">1 / 28<\u002Fdiv>\n\n<!-- ROTATE PROMPT (portrait phones/tablets) -->\n<div id=\"rotate-prompt\">\n  <div class=\"rp-phone\"><\u002Fdiv>\n  <div class=\"rp-title\" data-i18n=\"rotate_title\">Rotate your device<\u002Fdiv>\n  <div class=\"rp-sub\" data-i18n=\"rotate_sub\">This presentation is best viewed in landscape. Turn your phone sideways.<\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"edd7a2b3-bff4-4809-b7ae-df36e8f33ab3\"><\u002Fscript>\n<script>\n/* === STAGE SCALING (responsive, all devices) === */\nfunction scaleStage() {\n  const vp = document.getElementById('deck-viewport');\n  const stage = document.getElementById('deck-stage');\n  const vpW = vp.clientWidth;\n  const vpH = (window.visualViewport ? window.visualViewport.height : null) || vp.clientHeight;\n  const scaleX = vpW / 1920, scaleY = vpH / 1080;\n  const scale = Math.min(scaleX, scaleY);\n  const tx = Math.round((vpW - 1920 * scale) / 2);\n  const ty = Math.round((vpH - 1080 * scale) / 2);\n  stage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;\n  window._kStage = { scale, tx, ty };\n}\nwindow.addEventListener('resize', scaleStage);\nif (window.visualViewport) {\n  window.visualViewport.addEventListener('resize', scaleStage);\n  window.visualViewport.addEventListener('scroll', scaleStage);\n}\nscaleStage();\n\n/* === SLIDE NAVIGATION === */\nconst slides = document.querySelectorAll('.slide');\nconst total = slides.length;\nlet current = 0;\nlet chartsInitialized = false;\n\nfunction goTo(idx) {\n  if (idx < 0 || idx >= total || idx === current) return;\n  const outgoing = slides[current];          // capture NOW, not in the timeout\n  outgoing.classList.remove('active');\n  outgoing.classList.add('exit');\n  setTimeout(() => { outgoing.classList.remove('exit'); }, 650);\n  current = idx;\n  slides[current].classList.remove('exit');  // ensure incoming is never stuck hidden\n  slides[current].classList.add('active');\n  document.getElementById('slide-counter').textContent = `${current+1} / ${total}`;\n  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===current));\n  // Progress bars animation\n  if (current === 21) {\n    setTimeout(() => {\n      document.querySelectorAll('.progress-bar-fill').forEach(b => {\n        b.style.transition = 'width 1.2s ease';\n      });\n    }, 400);\n  }\n  // Init charts\n  if (!chartsInitialized && (current === 4 || current === 19)) {\n    initCharts();\n    chartsInitialized = true;\n  }\n  if (current === 4 && !chartsInitialized) { initCharts(); chartsInitialized = true; }\n  if (current === 19 && !chartsInitialized) { initCharts(); chartsInitialized = true; }\n}\nfunction next() { goTo((current + 1) % total); }\nfunction prev() { goTo((current - 1 + total) % total); }\n\ndocument.getElementById('nav-next').addEventListener('click', next);\ndocument.getElementById('nav-prev').addEventListener('click', prev);\n\nwindow.addEventListener('keydown', e => {\n  // Don't hijack keys while editing text inline\n  if (document.body.classList.contains('editing') ||\n      (e.target && (e.target.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)))) return;\n  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }\n  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }\n  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); goTo(0); }  // restart from the beginning\n});\n\n// Touch swipe\nlet touchStartX = 0;\ndocument.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });\ndocument.addEventListener('touchend', e => {\n  const dx = e.changedTouches[0].clientX - touchStartX;\n  if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }\n});\n\n// Nav dots\nconst dotsContainer = document.getElementById('nav-dots');\nfor (let i = 0; i < total; i++) {\n  const dot = document.createElement('div');\n  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');\n  dot.addEventListener('click', () => goTo(i));\n  dotsContainer.appendChild(dot);\n}\n\n/* === CHARTS === */\nfunction initCharts() {\n  Chart.defaults.color = '#999';\n  Chart.defaults.font.family = \"'HelveticaNeue', 'Helvetica Neue', Helvetica, Arial, sans-serif\";\n\n  // Market bar chart\n  const mCtx = document.getElementById('marketChart');\n  if (mCtx) {\n    new Chart(mCtx, {\n      type: 'bar',\n      data: {\n        labels: ['Population', 'Mobile Conn.', 'Smartphones', 'Internet Users', 'BI Holders'],\n        datasets: [{\n          data: [36.8, 30.5, 18.2, 17.6, 20.5],\n          backgroundColor: '#FFB81D',\n          borderRadius: 6,\n          borderSkipped: false,\n        }]\n      },\n      options: {\n        responsive: false,\n        animation: { duration: 1200, easing: 'easeOutQuart' },\n        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw}M` } } },\n        scales: {\n          y: { grid: { color: '#333' }, ticks: { color: '#999', callback: v => v+'M' } },\n          x: { grid: { display: false }, ticks: { color: '#ccc' } }\n        }\n      }\n    });\n  }\n\n  // Donut chart\n  const dCtx = document.getElementById('donutChart');\n  if (dCtx) {\n    new Chart(dCtx, {\n      type: 'doughnut',\n      data: {\n        labels: ['Android', 'iOS', 'Other'],\n        datasets: [{\n          data: [82, 12, 6],\n          backgroundColor: ['#FFB81D', '#c8960f', '#555'],\n          borderWidth: 0, hoverOffset: 4\n        }]\n      },\n      options: {\n        responsive: false,\n        cutout: '70%',\n        animation: { duration: 1200 },\n        plugins: { legend: { display: false } }\n      }\n    });\n  }\n\n  // 6-year revenue stacked bar\n  const rCtx = document.getElementById('revenueChart');\n  if (rCtx) {\n    new Chart(rCtx, {\n      type: 'bar',\n      data: {\n        labels: ['2026', '2027', '2028', '2029', '2030', '2031'],\n        datasets: [\n          { label: 'B2G', data: [0, 80, 260, 580, 1150, 2200], backgroundColor: '#FFB81D', borderRadius: 4, stack: 'a' },\n          { label: 'B2B', data: [0, 30, 140, 420, 980, 2000], backgroundColor: '#c8960f', borderRadius: 4, stack: 'a' },\n          { label: 'B2C', data: [0, 10, 80, 200, 670, 1300], backgroundColor: '#666', borderRadius: 4, stack: 'a' },\n        ]\n      },\n      options: {\n        responsive: false,\n        animation: { duration: 1400, easing: 'easeOutQuart' },\n        plugins: {\n          legend: { display: false },\n          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: €${ctx.raw}K` } }\n        },\n        scales: {\n          y: { stacked: true, grid: { color: '#2a2a2a' }, ticks: { color: '#999', callback: v => v >= 1000 ? '€'+(v/1000).toFixed(1)+'M' : '€'+v+'K' } },\n          x: { stacked: true, grid: { display: false }, ticks: { color: '#ccc' } }\n        }\n      }\n    });\n  }\n}\n\n// Init charts for slide 5 right away (slides are 0-indexed, slide 5 is index 4)\n// We call initCharts on demand but also do an initial pass\nwindow.addEventListener('load', () => {\n  setTimeout(initCharts, 300);\n  chartsInitialized = true;\n});\n<\u002Fscript>\n\n<script src=\"17e4d52e-0436-4508-9cdd-7f59b704bff2\"><\u002Fscript>\n<script src=\"cdd60c88-b80d-4dcf-bfc4-af18479143c7\"><\u002Fscript>\n<script>\n/* Load PptxGenJS via a resilient CDN chain (no failing static request). */\n(function(){\n  var cdns=[\n    'https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',\n    'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js',\n    'https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundle.js'\n  ];\n  var inlined = (window.__resources && window.__resources.pptxLib) ? window.__resources.pptxLib : null;\n  if (inlined) cdns.unshift(inlined);\n  (function load(i){\n    if(i>=cdns.length || typeof PptxGenJS!=='undefined') return;\n    var s=document.createElement('script');\n    s.src=cdns[i];\n    s.onerror=function(){ load(i+1); };\n    document.head.appendChild(s);\n  })(0);\n})();\n<\u002Fscript>\n<script>\n/* =============================================\n   EXPORT SYSTEM — PDF & PPTX\n   Captures each slide at full 1920×1080 by\n   temporarily removing the viewport transform.\n   ============================================= */\n\nfunction eoStatus(title, sub, pct) {\n  document.getElementById('export-overlay').classList.add('show');\n  document.getElementById('eo-title').textContent = title;\n  document.getElementById('eo-sub').textContent = sub;\n  document.getElementById('eo-fill').style.width = pct + '%';\n}\nfunction eoHide() { document.getElementById('export-overlay').classList.remove('show'); }\nfunction eoLock(on) {\n  ['pdf-btn','pptx-btn'].forEach(id => { document.getElementById(id).disabled = on; });\n}\n\n/* High-resolution master capture (2× → 3840×2160) for crisp PDF / PPTX.\n   Captures the LIVE stage at native size with the `capturing` class, which\n   forces every entrance-animated element to its final, fully-visible state —\n   so transition slides never render as a black/empty frame. */\nconst __EXPORT_SCALE = 2;   // 1920×1080 → 3840×2160 master; PNG keeps it crisp\n\nasync function captureSlideAt(idx) {\n  // Navigate so charts / per-slide state are live, then settle.\n  goTo(idx);\n  const stage  = document.getElementById('deck-stage');\n  const slides = document.querySelectorAll('.slide');\n  // Chart slides need longer for Chart.js to finish its draw animation.\n  const hasChart = !!slides[idx].querySelector('canvas');\n  await new Promise(r => setTimeout(r, hasChart ? 1500 : 340));\n\n  // Make ONLY the target slide visible and fully settled (no mid-transition).\n  slides.forEach((s, i) => { s.classList.toggle('active', i === idx); s.classList.remove('exit'); });\n\n  // Freeze animations + force entrance elements visible (CSS handles this).\n  document.body.classList.add('capturing');\n  const wasEditing = document.body.classList.contains('editing');\n  if (wasEditing) document.body.classList.remove('editing');\n\n  // Drop the responsive scale so the stage renders at native 1920×1080.\n  const savedTransform = stage.style.transform;\n  stage.style.transform = 'none';\n\n  // Commit layout before capture.\n  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));\n  await new Promise(r => setTimeout(r, 90));\n\n  const canvas = await html2canvas(stage, {\n    x: 0, y: 0,\n    width: 1920,\n    height: 1080,\n    windowWidth: 1920,\n    windowHeight: 1080,\n    scale: __EXPORT_SCALE,   // high-resolution master\n    useCORS: true,\n    allowTaint: true,\n    backgroundColor: null,   // keep each slide's own background (yellow / dark)\n    logging: false,\n    imageTimeout: 0,\n    foreignObjectRendering: false\n  });\n\n  // ── Restore live view ─────────────────────────────────────────────────────\n  stage.style.transform = savedTransform;\n  document.body.classList.remove('capturing');\n  if (wasEditing) document.body.classList.add('editing');\n\n  return canvas;\n}\n\nasync function exportPDF() {\n  if (!window.jspdf) { alert('PDF library not yet loaded – please wait a moment and try again.'); return; }\n  const n   = document.querySelectorAll('.slide').length;\n  const was = current;\n  eoLock(true);\n  try {\n    const { jsPDF } = window.jspdf;\n    const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1920, 1080], compress: true });\n\n    for (let i = 0; i < n; i++) {\n      eoStatus('EXPORTING PDF', `Rendering slide ${i+1} of ${n}…`, Math.round((i / n) * 94));\n      const c = await captureSlideAt(i);\n      if (i > 0) pdf.addPage([1920, 1080], 'landscape');\n      // Max-quality JPEG (0.98) from a 2× master — reliable across browsers and\n      // far cleaner than the previous 0.95+FAST setting. 'MEDIUM' = lossless\n      // PDF stream compression (does not re-touch the image quality).\n      pdf.addImage(c.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, 1920, 1080, '', 'MEDIUM');\n    }\n    eoStatus('SAVING', 'Writing file…', 99);\n    await new Promise(r => setTimeout(r, 120));\n    pdf.save('Kuata_Pitch_2026.pdf');\n  } catch(e) {\n    console.error(e);\n    alert('PDF export failed:\\n' + e.message);\n  } finally {\n    goTo(was);\n    eoHide();\n    eoLock(false);\n  }\n}\n\nasync function exportPPTX() {\n  if (typeof PptxGenJS === 'undefined') { alert('PPTX library not yet loaded – please wait a moment and try again.'); return; }\n  const n   = document.querySelectorAll('.slide').length;\n  const was = current;\n  eoLock(true);\n  try {\n    const pptx = new PptxGenJS();\n    pptx.layout  = 'LAYOUT_WIDE';\n    pptx.title   = 'Kuata Investor Deck 2026';\n    pptx.subject = 'Angola Digital Identity Wallet';\n    pptx.author  = 'Josimar Carlos · Kuata';\n\n    for (let i = 0; i < n; i++) {\n      eoStatus('EXPORTING PPTX', `Rendering slide ${i+1} of ${n}…`, Math.round((i / n) * 94));\n      const c = await captureSlideAt(i);\n      const slide = pptx.addSlide();\n      slide.addImage({ data: c.toDataURL('image/jpeg', 0.98), x: 0, y: 0, w: '100%', h: '100%' });\n    }\n    eoStatus('COMPILING', 'Building PPTX file…', 99);\n    await new Promise(r => setTimeout(r, 120));\n    await pptx.writeFile({ fileName: 'Kuata_Pitch_2026.pptx' });\n  } catch(e) {\n    console.error(e);\n    alert('PPTX export failed:\\n' + e.message);\n  } finally {\n    goTo(was);\n    eoHide();\n    eoLock(false);\n  }\n}\n<\u002Fscript>\n\n\n<script>\n/* === LANGUAGE TOGGLE === */\n(function() {\n  let lang = 'en';\n\n  const I18N_PT = {\n  cover_title: `A Carteira de<br>Identidade Digital<br>de Angola.`,\n  cover_sub: `DECK DE INVESTIDORES · 2026`,\n  s2_lbl: `Agenda`,\n  ag_opp: `Oportunidade`,\n  ag_prob: `O Problema`,\n  ag_mkt: `Dimensão do Mercado`,\n  ag_mktopp: `Oportunidade de Mercado`,\n  ag_why: `Porquê Agora`,\n  ag_prod: `Produto`,\n  ag_sol: `Solução`,\n  ag_how: `Como F ne, telemedicina, tele-educação.`,\n  bs_wind2: `O governo tem um mandato activo para digitalizar os serviços públicos e expandir a modernização administrativa.`,\n  bs_wind3: `Cada contacto com um documento físico tem um custo — para o Estado e para o cidadão. O digital elimina-o.`,\n  bs_tech1: `React Native + módulos biométricos nativos (Face ID, impressão digital). Armazenamento offline-first com cache local encriptada.`,\n  bs_tech2: `Microsserviços Node.js, gateway GraphQL. Sem estado por design; escala horizontal via orquestração de contentores no AWS ECS Fargate.`,\n  bs_tech3: `Chaves atestadas por hardware, encriptação ponta-a-ponta por documento, KMS FIPS 140-2, alinhado com ISO 27001, fluxos de verificação de conhecimento zero.`,\n  bs_tech4: `AWS af-south-1 (Cidade do Cabo). Residência regional de dados. Roteiro SOC 2 Tipo II, modelo de dados alinhado com o RGPD.`,\n  bs_tech5: `Adaptadores dedicados por ministério (DNIRN, SME, Trânsito, Seguros). Sincronização orientada a eventos; verificação consciente de revogação.`,\n  bs_tech6: `Registo de auditoria completo por evento de verificação. Registos à prova de adulteração para conformidade e transparência de acesso a dados do cidadão.`,\n  bs_comp1: `Sem integrações estatais. Sem português.`,\n  bs_comp2: `Sem APIs ministeriais. Sem verificação offline.`,\n  bs_comp3: `Não adaptada para Angola. Sem integração DNIRN/SME.`,\n  bs_why1: `Os contratos de API directos com ministérios angolanos não se compram — ganham-se. Vantagem de pioneiro num mercado de relacionamento intenso.`,\n  bs_why2: `UX com português em primeiro lugar, optimizada para redes de baixa largura de banda, verificação offline, trilhos de pagamento local prontos.`,\n  bs_why3: `O Estado ganha modernização; o cidadão ganha conveniência. A Kuata encaixa-se claramente em ambas as colunas.`,\n  bs_why4: `Uma vez que a identidade está nos trilhos, tudo o resto — fintech, registos de saúde, credenciais de votação, chaves digitais — conecta-se à mesma camada de confiança.`,\n  bs_bg_lockIn: `Fidelização via contratos. Sem limites de utilizadores.`,\n  bs_bc_mass: `Adopção massiva impulsiona volume de verificação → receita B2G`,\n  bs_ent1: `As empresas emitem crachás de identificação digital através do portal empresarial da Kuata. Subscrição com preço por colaborador.`,\n  bs_ent2: `Edifícios, escritórios e estacionamentos usam fechaduras NFC/BLE compatíveis com Kuata. Hardware alugado ou vendido — manutenção incluída no aluguer.`,\n  bs_ent3: `Claude via Amazon Bedrock: paga facturas (ENDE/EPAL/telecomunicações), reserva bilhetes (TAAG, Multicines), gere transferências P2P — tudo confirmado via Face ID.`,\n  bs_ent_sub: `Subscrição baseada no número de colaboradores · Aluguer/venda de fechaduras digitais · Contratos mínimos de 24 meses · SLA de manutenção incluído`,\n  bs_econ1: `Co-marketing governamental + distribuição no ponto de emissão SIAC mantém o custo de aquisição muito abaixo dos benchmarks regionais de fintech.`,\n  bs_econ2: `Taxas de verificação B2B + funcionalidades premium compõem-se à medida que os tipos de documentos crescem por utilizador.`,\n  bs_econ3: `Benchmark saudável é 3×. A vantagem de distribuição da Kuata cria eficiência de capital excepcional.`,\n  bs_kpi_mau: `Cidadãos activos mensais`,\n  bs_kpi_ver: `Verificações anuais no A3`,\n  bs_kpi_act: `Instalação → primeiro doc verificado`,\n  bs_kpi_ltv: `Benchmark: saudável = 3×`,\n  bs_kpi_gm: `Estado estável no Ano 3`,\n  bs_kpi_ret: `Fidelização via contratos de licença`,\n  bs_sov1: `Todos os dados dos cidadãos são armazenados na região AWS mais próxima de Angola — af-south-1 (Cidade do Cabo). Dados ministeriais processados em infraestrutura de cloud soberana. Sem transferência de dados transfronteiriça sem consentimento.`,\n  bs_sov2: `Os documentos são assinados e verificados criptograficamente sem exposição de dados brutos. A Kuata nunca vê dados em texto simples dos cidadãos — apenas atestações verificadas.`,\n  bs_sov3: `Cada evento de acesso registado ao abrigo da Lei Angolana 22/11. Os cidadãos podem ver quem acedeu aos seus dados, quando e porquê. Transparência total por design.`,\n  bs_tk1: `Soberania de dados garantida por ISO 27001, 9001, RGPD, SOC 2 &amp; PCI DSS — não por participação accionista. Liderada por fundadores, financiável por capital de risco, de confiança soberana.`,\n  bs_tk2: `Português em primeiro lugar, optimizada para Android, baixa largura de banda, verificação offline — não adaptada. Nativa.`,\n  bs_tk3: `Licenciamento B2G + APIs B2B + Premium B2C + Cartões de acesso empresarial — quatro fluxos independentes, nenhum dependente de pagamentos do cidadão.`,\n  bs_tk4: `Cada verificação registada com ID do agente, localização e hora — a conformidade torna-se produto.`,\n  bs_tk5: `€150K para MVP e certificação completa. 28× LTV:CAC e CAC médio de €0,40 impulsionado pelo ponto de emissão SIAC.`,\n  bs_tk6: `Expansão PALOP (África de Língua Portuguesa) concebida na arquitectura desde o primeiro dia.`,\n  bs_bg_unl: `<span style=\"color:var(--white);\">Licenças ilimitadas de verificação<\u002Fspan> pagas anualmente pelos ministérios`,\n  bs_bg_lease: `<span style=\"color:var(--white);\">Aluguer de dispositivos policiais<\u002Fspan> — taxa mensal cobre hardware de verificação, manutenção & substituição total`,\n  bs_bb_ins: `<span style=\"color:var(--white);\">Seguradoras via API<\u002Fspan> — verificação de agentes policiais em hospitais`,\n  bs_bb_bank: `<span style=\"color:var(--white);\">Aluguer de dispositivos bancários<\u002Fspan> — equipamento de verificação para validação de BI nas agências`,\n  bs_bb_emp: `<span style=\"color:var(--white);\">Cartões de acesso empresariais<\u002Fspan> — empresas criam IDs digitais para colaboradores, alugam fechaduras digitais & portões de acesso`,\n  bs_bc_free: `<span style=\"color:var(--white);\">Tier Gratuito<\u002Fspan> — carteira digital completa, todos os 7 documentos, verificação QR, acesso offline`,\n  bs_bc_prem: `<span style=\"color:var(--white);\">Tier Premium<\u002Fspan> — adiciona assistente de IA Akili: pagamento de facturas, reserva de bilhetes, serviços gov., transferências P2P`,\n  bs_model_note: `Pressupostos do modelo: 1M MAU no A3 · taxa de verificação mensal de 40% · taxa média B2B de €0,18 · seed de €150K estende pista de 18 meses através de MVP e certificação (ISO 27001, 9001, SOC 2, RGPD, PCI DSS).`,\n  // ── Body-text (larger intro paragraphs) ──────────────────────────────────\n  bt_whynow: `Três ventos favoráveis convergem em Angola agora — nenhum estará tão fresco daqui a 24 meses.`,\n  bt_solution: `A Kuata é uma carteira digital móvel construída para o cidadão angolano, substituindo a colecção física de documentos que transportam todos os dias por uma única identidade digital verificável.`,\n  bt_moat: `O valor da Kuata não é a app — qualquer um pode desenvolver uma interface. O valor é o pipeline de dados de confiança que a liga ao Estado.`,\n  bt_journey: `Da instalação ao primeiro documento digital verificado no dispositivo. Referência: média global de carteiras &gt; 4 minutos.`,\n  bt_police: `Quando um agente de trânsito para um condutor, a Kuata gere o processo, regista a interacção e devolve o estado em tempo real da base de dados policial — tudo numa troca verificada.`,\n  bt_comp: `As carteiras globais resolvem fidelidade & pagamentos. As plataformas de identidade resolvem o armazenamento. Nenhuma é construída para o cidadão angolano, integrada com ministérios angolanos ou localizada em português.`,\n  bt_ask: `Suficiente para lançar o MVP, obter todas as certificações de conformidade essenciais e assinar o primeiro contrato ministerial.`,\n  bt_sov: `A Kuata permanece 100% liderada por fundadores e financiável por capital de risco. A soberania de dados é garantida através de arquitectura e certificação — não através de propriedade. Os dados dos cidadãos nunca saem de Angola.`,\n  bt_audit_law: `O registo de auditoria é imutável, visível pelo cidadão e retido ao abrigo da Lei Angolana 22/11 sobre Protecção de Dados Pessoais.`,\n  // ── Step subtitles ───────────────────────────────────────────────────────\n  ss_install: `App Store / Play Store`,\n  ss_scan: `Digitalizar BI + selfie com detecção de vida`,\n  ss_validate: `DNIRN valida em tempo real`,\n  ss_docs: `Todos os docs ligados aparecem`,\n  ss_share: `Código QR, bloqueado por biometria`,\n  ss_pol1: `Agente solicita documentos`,\n  ss_pol2: `Dispositivo verificador lê a app do cidadão`,\n  ss_pol3: `JWS verificado offline &lt;1s`,\n  ss_pol4: `Mandados, incidentes, acidentes`,\n  ss_pol5: `ID do agente, data, hora, localização`,\n  ss_unlock1: `Todos os 7 tipos de documentos em beta privado.`,\n  ss_unlock2: `Integração DNIRN em produção.`,\n  ss_unlock3: `iOS + Android, disponibilidade nacional.`,\n  ss_unlock4: `Primeiros 5 bancos ou telecomunicações integrados.`,\n  ss_unlock5: `Trajectória de 1M MAU, receita B2G recorrente.`,\n  // ── Row text / sub ───────────────────────────────────────────────────────\n  rt_dnirn_docs: `Bilhete de Identidade · Certidões de Nascimento · Certidões de Casamento`,\n  rt_transit_docs: `Carta de condução · Registo do veículo · Correspondência de seguros`,\n  rt_ins_sub: `Integrações do sector privado`,\n  rt_ins_docs: `Cartões de seguro de saúde · Seguro automóvel · Cartões de fidelidade & associação`,\n  rt_sme_sub: `SME — Serviço de Migração e Estrangeiros`,\n  rt_sme_docs: `Passaportes · Documentos de viagem e passagem de fronteira`,\n  rt_audit_trail: `Data · hora · localização · nome do agente · ID do agente · ID do cidadão · documento apresentado · resultado`,\n  // ── The Ask allocation ───────────────────────────────────────────────────\n  ask_prod_eng: `Produto & Eng`,\n  ask_compliance: `Conformidade`,\n  ask_gtm: `GTM & Marca`,\n  ask_ops: `Operações`,\n  ask_desc_prod: `Desenvolvimento do MVP — app do cidadão, app verificadora, backend, serviço de assinatura criptográfica.`,\n  ask_desc_comp: `Certificações ISO 27001, 9001, RGPD, SOC 2, PCI DSS. AIPD ao abrigo da Lei Angolana 22/11. Assessoria jurídica.`,\n  ask_desc_gtm: `Contratação de CTO, 4 engenheiros, desenvolvimento móvel + backend até ao lançamento público.`,\n  ask_desc_ops: `Pista de 18 meses até ao primeiro contrato assinado e marco da Série A.`,\n  // ── Roadmap descriptions ─────────────────────────────────────────────────\n  rm_desc1: `Beta privado — 500 utilizadores em Luanda. BI + carta de condução. Primeiro sandbox de integração DNIRN.`,\n  rm_desc2: `App Store / Play Store. Todos os 7 tipos de documentos. Primeiro contrato ministerial assinado activo. Objectivo de 20K MAU.`,\n  rm_desc3: `Verificação API aberta a bancos, telecomunicações. Integração de parceiros de seguros. Lançamento de cartões de acesso empresarial. 250K MAU.`,\n  rm_desc4: `PALOP: Moçambique, Cabo Verde, São Tomé em primeiro lugar. Gatilho para Série A. Trajectória de 1M MAU.`,\n  // ── Footnotes / sources ──────────────────────────────────────────────────\n  fn_market: `Fontes: DataReportal Digital 2026; Statista; Banco Mundial.`,\n  fn_android: `Desenvolvimento centrado no Android. Paridade iOS no lançamento público.`,\n  fn_whynow: `Fontes: Ministro das Telecomunicações (Angola), 2025; Plano Nacional de Desenvolvimento 2023–2027; Ministério da Justiça (DNIRN).`,\n  // ── Certification badges ─────────────────────────────────────────────────\n  cert_iso27001: `ISO 27001 — Gestão de Segurança da Informação`,\n  cert_iso9001: `ISO 9001 — Sistemas de Gestão da Qualidade`,\n  cert_gdpr: `RGPD — Protecção de Dados & Privacidade`,\n  cert_soc2: `SOC 2 Tipo II — Segurança & Disponibilidade`,\n  cert_pci: `PCI DSS — Segurança da Indústria de Cartões de Pagamento`,\n  // ── Enterprise tier lists ────────────────────────────────────────────────\n  tier_free_list: `✓ Todos os 7 documentos<br>✓ Verificação QR<br>✓ Acesso offline<br>✓ Bloqueio biométrico<br>― Akili IA`,\n  tier_prem_list: `✓ Tudo do Gratuito +<br>✓ <span style=\"color:var(--yellow);\">Assistente Akili IA<\u002Fspan><br>✓ Pagamento de facturas<br>✓ Reserva de bilhetes<br>✓ Transferências P2P`,\n  // ── Bottom labels ────────────────────────────────────────────────────────\n  bottom_label: `KUATA · DECK DE INVESTIDORES 2026`,\n  bottom_conf: `CONFIDENCIAL · DECK DE INVESTIDORES KUATA 2026`,\n  rotate_title: `Rode o seu dispositivo`,\n  rotate_sub: `Esta apresentação é melhor vista na horizontal. Vire o telemóvel de lado.`,\n  cover_drop: `Arraste uma imagem aqui<br>ou clique para carregar`\n};\n\n  /* ── Auto translation map: every remaining EN string → PT ──────────────────\n     Applied at the text-node level so all markup (br, spans, styling) is\n     preserved. Strings not listed (codes, numbers, proper nouns, emails) stay\n     identical in both languages. */\n  const T = {\n    \"3-yr LTV\": \"LTV 3 anos\",\n    \"ACTIVATION RATE\": \"TAXA DE ACTIVAÇÃO\",\n    \"API Fees · Device Leasing · Subscriptions\": \"Taxas de API · Aluguer de Equipamento · Subscrições\",\n    \"Angola-native · DNIRN verified\": \"Nativo de Angola · Verificado pelo DNIRN\",\n    \"B2C Subscription Tiers\": \"Níveis de Subscrição B2C\",\n    \"Biometric + PIN secured\": \"Protegido por biometria + PIN\",\n    \"Biometric · QR · Offline\": \"Biométrico · QR · Offline\",\n    \"Blended CAC\": \"CAC Combinado\",\n    \"Build your digital Wallet\": \"Construa a sua carteira digital\",\n    \"Built for Angola. Ministry APIs. Portuguese-first. Offline-capable.\": \"Construída para Angola. APIs ministeriais. Português em primeiro. Funciona offline.\",\n    \"CONFIDENTIAL · KUATA INVESTOR DECK 2026\": \"CONFIDENCIAL · DECK DE INVESTIDORES KUATA 2026\",\n    \"Citizens\": \"Cidadãos\",\n    \"Continue with Google\": \"Continuar com Google\",\n    \"Directorate of Aviation & Transit\": \"Direcção de Aviação e Trânsito\",\n    \"Documents\": \"Documentos\",\n    \"Enterprise\": \"Empresas\",\n    \"Enterprise Pricing Model\": \"Modelo de Preços Empresarial\",\n    \"Every Verification is Logged\": \"Cada Verificação é Registada\",\n    \"FREE\": \"GRÁTIS\",\n    \"Freemium · Network Effect · AI Upsell\": \"Freemium · Efeito de Rede · Upsell de IA\",\n    \"GDPR — Data Protection & Privacy\": \"RGPD — Protecção de Dados e Privacidade\",\n    \"GOVT RETENTION\": \"RETENÇÃO GOV.\",\n    \"GROSS MARGIN\": \"MARGEM BRUTA\",\n    \"Global ID Apps\": \"Apps de ID Globais\",\n    \"Government\": \"Governo\",\n    \"Gross Margin (Y3 onwards)\": \"Margem Bruta (A3 em diante)\",\n    \"Insurance & Commercial Partners\": \"Seguros e Parceiros Comerciais\",\n    \"Kuata App\": \"App Kuata\",\n    \"Language\": \"Idioma\",\n    \"Let's get to it\": \"Vamos a isto\",\n    \"MAU BY YEAR 3\": \"MAU NO ANO 3\",\n    \"MAU by Year 6\": \"MAU no Ano 6\",\n    \"MVP + Pilot\": \"MVP + Piloto\",\n    \"Ministry of Justice & Human Rights\": \"Ministério da Justiça e dos Direitos Humanos\",\n    \"Ministério dos Transportes / National Traffic Directorate\": \"Ministério dos Transportes / Direcção Nacional de Trânsito\",\n    \"New Features\": \"Novidades\",\n    \"Offline QR verification\": \"Verificação QR offline\",\n    \"Operations\": \"Operações\",\n    \"Other\": \"Outro\",\n    \"Our Certifications\": \"As Nossas Certificações\",\n    \"PART FIVE\": \"PARTE CINCO\",\n    \"PART FOUR\": \"PARTE QUATRO\",\n    \"PART ONE\": \"PARTE UM\",\n    \"PART THREE\": \"PARTE TRÊS\",\n    \"PART TWO\": \"PARTE DOIS\",\n    \"Physical, fragile, replaceable only in person.\": \"Físico, frágil, substituível apenas presencialmente.\",\n    \"Portuguese-first, Umbundu & Kimbundu roadmap\": \"Português primeiro, Umbundu e Kimbundu no roteiro\",\n    \"Projections. PALOP expansion from Y4.\": \"Projecções. Expansão PALOP a partir do A4.\",\n    \"Public Launch\": \"Lançamento Público\",\n    \"Recurring · Predictable · Sticky\": \"Recorrente · Previsível · Fidelizado\",\n    \"Regional Expansion\": \"Expansão Regional\",\n    \"SOC 2 Type II — Security & Availability\": \"SOC 2 Tipo II — Segurança e Disponibilidade\",\n    \"Scale & B2B\": \"Escala e B2B\",\n    \"Security is\": \"A segurança é\",\n    \"Sign in with Apple\": \"Iniciar sessão com Apple\",\n    \"Support Chat\": \"Chat de Apoio\",\n    \"Thank\": \"Muito\",\n    \"Total Revenue Y6 (2031)\": \"Receita Total A6 (2031)\",\n    \"Unlocked\": \"Desbloqueada\",\n    \"VERIFICATION EVENTS\": \"EVENTOS DE VERIFICAÇÃO\",\n    \"Verification is slow and manual.\": \"A verificação é lenta e manual.\",\n    \"Welcome!\": \"Bem-vindo!\",\n    \"Your Identity\": \"A Sua Identidade\",\n    \"Zero interoperability.\": \"Zero interoperabilidade.\",\n    \"our top\": \"a nossa\",\n    \"priority\": \"prioridade máxima\",\n    \"you!\": \"obrigado!\",\n    \"← NOTIFICATIONS\": \"← NOTIFICAÇÕES\",\n    \"🇺🇸 English\": \"🇺🇸 Inglês\"\n  };\n\n  const NORM = s => s.replace(/\\s+/g, ' ').trim();\n  const INLINE = new Set(['SPAN','B','I','EM','STRONG','U','BR','A']);\n  function onlyInline(el){\n    for (const c of el.children){ if (!INLINE.has(c.tagName)) return false; if (!onlyInline(c)) return false; }\n    return true;\n  }\n  // Build the PT innerHTML for an auto element by translating its text nodes.\n  function ptInnerHTML(el){\n    const clone = el.cloneNode(true);\n    const w = document.createTreeWalker(clone, NodeFilter.SHOW_TEXT, null);\n    let n, changed = false;\n    while ((n = w.nextNode())){\n      const raw = n.nodeValue, t = NORM(raw);\n      if (t && T[t] !== undefined){\n        const lead = raw.match(/^\\s*/)[0], trail = raw.match(/\\s*$/)[0];\n        n.nodeValue = lead + T[t] + trail; changed = true;\n      }\n    }\n    return changed ? clone.innerHTML : null;\n  }\n\n  /* ── Collect every translatable / editable unit ─────────────────────────────\n     A \"unit\" is one element whose innerHTML we swap between EN and PT:\n       • data-i18n elements        → PT from the I18N_PT dictionary\n       • outermost inline-only els → PT computed from the T map\n       • loose translatable text   → wrapped in a <span> so it becomes a unit  */\n  const units = [];\n  function collect(el, slide){\n    if (el !== slide && el.nodeType === 1){\n      if (el.hasAttribute('data-i18n')){\n        const key = el.dataset.i18n;\n        units.push({ el, en: el.innerHTML, pt: (I18N_PT[key] !== undefined ? I18N_PT[key] : null) });\n        return;\n      }\n      if (/[A-Za-z]/.test(el.textContent) && onlyInline(el) && !el.querySelector('[data-i18n]')){\n        const pt = ptInnerHTML(el);\n        if (pt !== null) units.push({ el, en: el.innerHTML, pt });\n        return;\n      }\n    }\n    Array.from(el.childNodes).forEach(c => {\n      if (c.nodeType === 3){\n        const raw = c.nodeValue, t = NORM(raw);\n        if (t && T[t] !== undefined){\n          const span = document.createElement('span');\n          span.textContent = raw;\n          c.parentNode.replaceChild(span, c);\n          const lead = raw.match(/^\\s*/)[0], trail = raw.match(/\\s*$/)[0];\n          units.push({ el: span, en: raw, pt: lead + T[t] + trail });\n        }\n      } else if (c.nodeType === 1){\n        collect(c, slide);\n      }\n    });\n  }\n\n  /* ── Edit overrides (persisted) ─────────────────────────────────────────── */\n  let edits;\n  try { edits = JSON.parse(localStorage.getItem('kuata_edits') || '{\"en\":{},\"pt\":{}}'); }\n  catch(e){ edits = { en:{}, pt:{} }; }\n  if (!edits.en) edits.en = {}; if (!edits.pt) edits.pt = {};\n  function saveEdits(){ try { localStorage.setItem('kuata_edits', JSON.stringify(edits)); } catch(e){} }\n\n  function applyLang(newLang){\n    lang = newLang;\n    try { localStorage.setItem('kuata_lang', lang); } catch(e){}\n    const btn = document.getElementById('lang-btn');\n    if (btn) btn.textContent = lang === 'en' ? 'PT' : 'EN';\n    units.forEach((u, i) => {\n      const ov = edits[lang][i];\n      if (ov !== undefined){ u.el.innerHTML = ov; return; }\n      if (lang === 'pt') u.el.innerHTML = (u.pt !== null ? u.pt : u.en);\n      else u.el.innerHTML = u.en;\n    });\n  }\n\n  window.toggleLang = function(){ applyLang(lang === 'en' ? 'pt' : 'en'); };\n\n  /* ── Inline editing ─────────────────────────────────────────────────────── */\n  window.toggleEdit = function(){\n    const on = !document.body.classList.contains('editing');\n    document.body.classList.toggle('editing', on);\n    const btn = document.getElementById('edit-btn');\n    units.forEach(u => { if (on) u.el.setAttribute('contenteditable','true'); else u.el.removeAttribute('contenteditable'); });\n    if (btn){ btn.textContent = on ? '✓ Done editing' : '✎ Edit images & text'; btn.classList.toggle('active', on); }\n  };\n\n  function init(){\n    document.querySelectorAll('.slide').forEach(s => collect(s, s));\n    units.forEach((u, i) => {\n      u.el.addEventListener('input', () => { edits[lang][i] = u.el.innerHTML; saveEdits(); });\n    });\n    let saved = 'en';\n    try { saved = localStorage.getItem('kuata_lang') || 'en'; } catch(e){}\n    applyLang(saved);\n  }\n\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);\n  else init();\n})();\n<\u002Fscript>\n\n<script>\n/* ============================================================================\n   REPLACEABLE IMAGE AREAS\n   Each phone-mockup composition is ONE replaceable image area (where a slide\n   shows two phones, they count as a single image). In Edit mode, hover the\n   area and click \"Replace image\" to upload your own picture — it fills the\n   whole area, replacing the entire mockup (not just an inner screen).\n   Uploads persist (localStorage) and appear in PDF / PPTX exports.\n   The little ✕ restores the original mockup.\n   ========================================================================== */\n(function () {\n  function ready(fn){\n    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn);\n    else fn();\n  }\n\n  ready(function () {\n    // Resolve a drag-drop OR file-input into a usable image src (data URL when\n    // possible). Handles: local files, data: URLs, and images dragged from a\n    // browser / Google Images (which arrive as a URL, not a file).\n    window.kuataResolveImageDrop = function (dt) {\n      return new Promise((resolve) => {\n        if (!dt) { resolve(null); return; }\n        const f = dt.files && dt.files[0];\n        if (f && /^image\\//.test(f.type)) {\n          const r = new FileReader();\n          r.onload = () => resolve(r.result);\n          r.onerror = () => resolve(null);\n          r.readAsDataURL(f);\n          return;\n        }\n        let url = '';\n        try { url = dt.getData('text/uri-list') || dt.getData('text/plain') || ''; } catch (_) {}\n        if (!url) {\n          let html = '';\n          try { html = dt.getData('text/html'); } catch (_) {}\n          const m = html && html.match(/<img[^>]+src=[\"']([^\"']+)[\"']/i);\n          if (m) url = m[1];\n        }\n        url = (url || '').trim().split(/\\s+/)[0];\n        if (!url) { resolve(null); return; }\n        if (/^data:image\\//i.test(url)) { resolve(url); return; }\n        // Try to fetch + inline (keeps it offline & exportable); fall back to raw URL.\n        fetch(url, { mode: 'cors' })\n          .then(r => r.blob())\n          .then(b => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = () => resolve(url); r.readAsDataURL(b); })\n          .catch(() => resolve(url));\n      });\n    };\n\n    let store;\n    try { store = JSON.parse(localStorage.getItem('kuata_images') || '{}'); }\n    catch (e) { store = {}; }\n    function save(){ try { localStorage.setItem('kuata_images', JSON.stringify(store)); } catch (e) {} }\n\n    function makeSlot(el, id, opts){\n      opts = opts || {};\n      el.classList.add('img-slot');\n      el.dataset.slot = id;\n\n      const input = document.createElement('input');\n      input.type = 'file';\n      input.accept = 'image/*';\n      input.style.display = 'none';\n\n      const ov = document.createElement('div');\n      ov.className = 'img-slot-ov';\n      ov.innerHTML = '<div class=\"ico\">⬆<\u002Fdiv><div class=\"lbl\">' + (opts.label || 'REPLACE<br>IMAGE') + '<\u002Fdiv>';\n\n      const rm = document.createElement('div');\n      rm.className = 'img-slot-rm';\n      rm.textContent = '✕';\n      rm.title = 'Remove uploaded image';\n\n      // Small replace button (edit mode, when an image is present)\n      const rp = document.createElement('div');\n      rp.className = 'img-slot-rp';\n      rp.textContent = '⬆';\n      rp.title = 'Replace image';\n\n      // Zoom controls (resize the image)\n      const zoom = document.createElement('div');\n      zoom.className = 'img-slot-zoom';\n      const zOut = document.createElement('button'); zOut.type = 'button'; zOut.className = 'img-zbtn'; zOut.textContent = '−'; zOut.title = 'Smaller';\n      const zIn  = document.createElement('button'); zIn.type = 'button';  zIn.className = 'img-zbtn'; zIn.textContent = '+'; zIn.title = 'Larger';\n      const zFit = document.createElement('button'); zFit.type = 'button'; zFit.className = 'img-zbtn img-zfit'; zFit.textContent = 'Fit'; zFit.title = 'Reset size & position';\n      zoom.appendChild(zOut); zoom.appendChild(zFit); zoom.appendChild(zIn);\n\n      // Resize handle (bottom-right corner, edit mode only)\n      const rz = document.createElement('div');\n      rz.className = 'img-slot-rz';\n      rz.title = 'Drag to resize';\n\n      // Per-slot transform state. scale === 0 is a sentinel meaning\n      // \"fit the whole image inside the frame\" (computed once dims load).\n      let state = { src: null, scale: 1, tx: 0, ty: 0 };\n      function normalize(v){\n        if (typeof v === 'string') return { src: v, scale: 1, tx: 0, ty: 0 };\n        return { src: v.src, scale: (v.scale != null ? v.scale : 1), tx: v.tx || 0, ty: v.ty || 0 };\n      }\n      function applyTransform(img){\n        img.style.transformOrigin = 'center center';\n        img.style.transform = 'translate(' + state.tx + 'px,' + state.ty + 'px) scale(' + state.scale + ')';\n      }\n      function persist(){ store[id] = { src: state.src, scale: state.scale, tx: state.tx, ty: state.ty }; save(); }\n\n      function showImage(val){\n        state = normalize(val);\n        let img = el.querySelector('img.slot-img');\n        if (!img){\n          img = document.createElement('img');\n          img.className = 'slot-img';\n          el.insertBefore(img, el.firstChild);\n        }\n        if (opts.fit) img.style.objectFit = opts.fit;\n        if (opts.pad) img.style.padding = opts.pad;\n        img.src = state.src;\n        applyTransform(img);\n        el.classList.add('has-img');\n        wireDrag(img);\n      }\n      function clearImage(){\n        const img = el.querySelector('img.slot-img');\n        if (img) img.remove();\n        el.classList.remove('has-img');\n        state = { src: null, scale: 1, tx: 0, ty: 0 };\n      }\n\n      // ── Drag-to-move (on the image) and drag-to-resize (on the handle) ──\n      function stageScale(){ return (window._kStage && window._kStage.scale) || 1; }\n      function wireDrag(img){\n        if (img._dragWired) return; img._dragWired = true;\n        img.addEventListener('pointerdown', (e) => {\n          if (!document.body.classList.contains('editing')) return;\n          e.preventDefault(); e.stopPropagation();\n          const sx = e.clientX, sy = e.clientY, sTx = state.tx, sTy = state.ty;\n          const sc = stageScale();\n          try { img.setPointerCapture(e.pointerId); } catch (err) {}\n          const move = (ev) => {\n            state.tx = sTx + (ev.clientX - sx) / sc;\n            state.ty = sTy + (ev.clientY - sy) / sc;\n            applyTransform(img);\n          };\n          const up = () => { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); persist(); };\n          document.addEventListener('pointermove', move);\n          document.addEventListener('pointerup', up);\n        });\n      }\n      rz.addEventListener('pointerdown', (e) => {\n        if (!document.body.classList.contains('editing')) return;\n        e.preventDefault(); e.stopPropagation();\n        const img = el.querySelector('img.slot-img'); if (!img) return;\n        const sx = e.clientX, sStart = state.scale;\n        const sc = stageScale();\n        const refW = el.offsetWidth || 400;\n        try { rz.setPointerCapture(e.pointerId); } catch (err) {}\n        const move = (ev) => {\n          const d = (ev.clientX - sx) / sc;        // stage px dragged\n          state.scale = Math.max(0.2, Math.min(6, sStart + (d / refW) * 2));\n          applyTransform(img);\n        };\n        const up = () => { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); persist(); };\n        document.addEventListener('pointermove', move);\n        document.addEventListener('pointerup', up);\n      });\n\n      ov.addEventListener('click', (e) => { e.stopPropagation(); input.click(); });\n      rp.addEventListener('click', (e) => { e.stopPropagation(); input.click(); });\n      rm.addEventListener('click', (e) => { e.stopPropagation(); delete store[id]; save(); clearImage(); });\n\n      function setScale(mult){\n        const img = el.querySelector('img.slot-img'); if (!img) return;\n        state.scale = Math.max(0.2, Math.min(8, state.scale * mult));\n        applyTransform(img); persist();\n      }\n      zOut.addEventListener('click', (e) => { e.stopPropagation(); setScale(1/1.2); });\n      zIn .addEventListener('click', (e) => { e.stopPropagation(); setScale(1.2); });\n      zFit.addEventListener('click', (e) => { e.stopPropagation(); const img = el.querySelector('img.slot-img'); if(!img) return; state.scale = 1; state.tx = 0; state.ty = 0; applyTransform(img); persist(); });\n\n      function loadFile(f){\n        if (!f || !/^image\\//.test(f.type)) return;\n        const reader = new FileReader();\n        reader.onload = () => {\n          // New image: start at fit-to-frame; user can resize/drag freely.\n          state = { src: reader.result, scale: 1, tx: 0, ty: 0 };\n          persist();\n          showImage(state);\n        };\n        reader.readAsDataURL(f);\n      }\n      input.addEventListener('change', () => { loadFile(input.files && input.files[0]); input.value = ''; });\n\n      // ── Drag & drop an image file onto the area (works in or out of edit) ──\n      function allowDrag(e){ if (!document.body.classList.contains('editing')) return; e.preventDefault(); e.stopPropagation(); try { e.dataTransfer.dropEffect = 'copy'; } catch(_){} el.classList.add('drag-over'); }\n      el.addEventListener('dragenter', allowDrag);\n      el.addEventListener('dragover', allowDrag);\n      el.addEventListener('dragleave', (e) => { el.classList.remove('drag-over'); });\n      el.addEventListener('drop', (e) => {\n        if (!document.body.classList.contains('editing')) return;\n        e.preventDefault(); e.stopPropagation();\n        el.classList.remove('drag-over');\n        window.kuataResolveImageDrop(e.dataTransfer).then((src) => {\n          if (!src) return;\n          state = { src, scale: 1, tx: 0, ty: 0 };\n          persist();\n          showImage(state);\n        });\n      });\n\n      // Empty drop zone: clicking anywhere opens the file picker.\n      if (el.hasAttribute('data-empty-zone')){\n        el.addEventListener('click', (e) => {\n          if (el.classList.contains('has-img')) return;  // when filled, image handles interaction\n          e.stopPropagation(); input.click();\n        });\n      }\n\n      el.appendChild(ov);\n      el.appendChild(rm);\n      el.appendChild(rp);\n      el.appendChild(zoom);\n      el.appendChild(rz);\n      el.appendChild(input);\n\n      if (store[id]) showImage(store[id]);\n    }\n\n    // Each two-phone mockup composition is ONE replaceable image area.\n    // Uploading an image replaces the whole area (both phones at once).\n    document.querySelectorAll('[data-img-area]')\n      .forEach((area) => makeSlot(area, 'area-' + area.dataset.imgArea, { fit: 'contain' }));\n\n    // Global guard: stop the browser from navigating to a file when it's\n    // dropped anywhere on the page (drops on an image area are handled there).\n    window.addEventListener('dragover', (e) => { e.preventDefault(); }, false);\n    window.addEventListener('drop', (e) => { e.preventDefault(); }, false);\n\n    // ── Floating images: drop an image onto ANY slide; drag & resize it. ──\n    (function setupFloatingImages(){\n      let fstore;\n      try { fstore = JSON.parse(localStorage.getItem('kuata_float_images') || '{}'); }\n      catch (e) { fstore = {}; }\n      function fsave(){ try { localStorage.setItem('kuata_float_images', JSON.stringify(fstore)); } catch (e) {} }\n\n      // Migrate an older cover-area upload into a floating image so the user's\n      // previously-placed cover image is not lost when that area was removed.\n      try {\n        const imgStore = JSON.parse(localStorage.getItem('kuata_images') || '{}');\n        const old = imgStore['area-cover-image'];\n        if (old && (old.src || typeof old === 'string')) {\n          const src = old.src || old;\n          if (!fstore['slide-1']) fstore['slide-1'] = [];\n          fstore['slide-1'].push({ src, x: 1160, y: 300, w: 560, h: 480 });\n          delete imgStore['area-cover-image'];\n          localStorage.setItem('kuata_images', JSON.stringify(imgStore));\n          fsave();\n        }\n      } catch (e) {}\n\n      function stageScale(){ return (window._kStage && window._kStage.scale) || 1; }\n      function editing(){ return document.body.classList.contains('editing'); }\n\n      document.querySelectorAll('.slide').forEach((slide) => {\n        const sid = slide.id;\n        if (!fstore[sid]) fstore[sid] = [];\n\n        function persist(){\n          fstore[sid] = [...slide.querySelectorAll('.float-img')].map(w => w._data);\n          fsave();\n        }\n\n        function makeFloat(data){\n          const wrap = document.createElement('div');\n          wrap.className = 'float-img';\n          wrap.style.left = data.x + 'px';\n          wrap.style.top = data.y + 'px';\n          wrap.style.width = data.w + 'px';\n          wrap.style.height = data.h + 'px';\n          wrap._data = data;\n\n          const img = document.createElement('img');\n          img.src = data.src;\n          img.draggable = false;\n          img.addEventListener('dragstart', (e) => e.preventDefault());\n          const rm = document.createElement('div'); rm.className = 'float-rm'; rm.textContent = '✕'; rm.title = 'Remove image';\n          const rz = document.createElement('div'); rz.className = 'float-rz'; rz.title = 'Drag to resize';\n          wrap.appendChild(img); wrap.appendChild(rm); wrap.appendChild(rz);\n          wrap.setAttribute('draggable', 'false');\n          wrap.addEventListener('dragstart', (e) => e.preventDefault());\n          slide.appendChild(wrap);\n\n          // Move\n          wrap.addEventListener('pointerdown', (e) => {\n            if (!editing() || e.target === rm || e.target === rz) return;\n            e.preventDefault(); e.stopPropagation();\n            const sx = e.clientX, sy = e.clientY, ox = data.x, oy = data.y, sc = stageScale();\n            const mv = (ev) => { data.x = ox + (ev.clientX - sx) / sc; data.y = oy + (ev.clientY - sy) / sc; wrap.style.left = data.x + 'px'; wrap.style.top = data.y + 'px'; };\n            const up = () => { document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); persist(); };\n            document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up);\n          });\n          // Resize (keeps aspect ratio)\n          rz.addEventListener('pointerdown', (e) => {\n            if (!editing()) return;\n            e.preventDefault(); e.stopPropagation();\n            const sx = e.clientX, ow = data.w, ar = data.h / data.w, sc = stageScale();\n            const mv = (ev) => { const nw = Math.max(60, ow + (ev.clientX - sx) / sc); data.w = nw; data.h = nw * ar; wrap.style.width = nw + 'px'; wrap.style.height = data.h + 'px'; };\n            const up = () => { document.removeEventListener('pointermove', mv); document.removeEventListener('pointerup', up); persist(); };\n            document.addEventListener('pointermove', mv); document.addEventListener('pointerup', up);\n          });\n          rm.addEventListener('click', (e) => { e.stopPropagation(); wrap.remove(); persist(); });\n          return wrap;\n        }\n\n        slide.addEventListener('dragenter', (e) => { if (!editing()) return; e.preventDefault(); slide.classList.add('slide-drag-over'); });\n        slide.addEventListener('dragover',  (e) => { if (!editing()) return; e.preventDefault(); try { e.dataTransfer.dropEffect = 'copy'; } catch(_){} slide.classList.add('slide-drag-over'); });\n        slide.addEventListener('dragleave', (e) => { if (e.target === slide) slide.classList.remove('slide-drag-over'); });\n        slide.addEventListener('drop', (e) => {\n          if (!editing()) return;\n          e.preventDefault(); e.stopPropagation();\n          slide.classList.remove('slide-drag-over');\n          const rect = slide.getBoundingClientRect();\n          const sc = stageScale();\n          const lx = (e.clientX - rect.left) / sc;\n          const ly = (e.clientY - rect.top) / sc;\n          window.kuataResolveImageDrop(e.dataTransfer).then((src) => {\n            if (!src) return;\n            const probe = new Image();\n            const place = (ar) => {\n              const w = 380, h = Math.max(60, Math.round(380 * ar));\n              makeFloat({ src, x: Math.round(lx - w / 2), y: Math.round(ly - h / 2), w, h });\n              persist();\n            };\n            probe.onload = () => place((probe.naturalHeight || 1) / (probe.naturalWidth || 1));\n            probe.onerror = () => place(0.72);\n            probe.src = src;\n          });\n        });\n\n        // Restore saved floats, de-duplicating any identical copies that an\n        // earlier version may have stacked on top of each other.\n        const seen = new Set();\n        fstore[sid] = (fstore[sid] || []).filter(d => {\n          if (!d || !d.src) return false;\n          const k = String(d.src).slice(0, 64) + '|' + d.x + ',' + d.y + ',' + d.w + ',' + d.h;\n          if (seen.has(k)) return false;\n          seen.add(k); return true;\n        });\n        fsave();\n        fstore[sid].forEach(d => makeFloat(d));\n      });\n    })();\n\n    // Safety: remove every image the user added (floating + area uploads).\n    window.clearAllImages = function(){\n      if (!confirm('Remove all images you added? This clears floating images and uploaded pictures, and cannot be undone.')) return;\n      try { localStorage.removeItem('kuata_float_images'); } catch(e){}\n      try { localStorage.removeItem('kuata_images'); } catch(e){}\n      location.reload();\n    };\n\n    // Clean up legacy per-phone uploads from older versions so they don't\n    // linger as half-replaced screens.\n    try {\n      const s = JSON.parse(localStorage.getItem('kuata_images') || '{}');\n      let dirty = false;\n      Object.keys(s).forEach(k => {\n        if (k === 'cover-logo' || /^slot-\\d+$/.test(k)) { delete s[k]; dirty = true; }\n      });\n      if (dirty) localStorage.setItem('kuata_images', JSON.stringify(s));\n    } catch (e) {}\n  });\n})();\n<\u002Fscript>\n\n\n\n\n\n\n<style id=\"__om-edit-overrides\">\n#slide-8 .img-slot >:is(img,video) { object-fit: fill !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: cover !important }\n#slide-8 .img-slot >:is(img,video) { opacity: 1 !important }\n#slide-8 .img-slot >:is(img,video) { opacity: 0.02 !important }\n#slide-8 .img-slot >:is(img,video) { opacity: 1 !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: scale-down !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: fill !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: none !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: contain !important }\n#slide-8 .img-slot >:is(img,video) { object-fit: cover !important }\n#slide-8 .img-slot >:is(img,video) { width: 500px !important }\n#slide-8 .img-slot >:is(img,video) { width: 600px !important }\n#slide-8 .img-slot >:is(img,video) { height: 600px !important }\n#slide-8 .img-slot >:is(img,video) { height: 700px !important }\n#slide-8 .img-slot >:is(img,video) { width: 700px !important }\n#slide-14 .img-slot >:is(img,video) { object-fit: cover !important }\n#slide-14 .img-slot >:is(img,video) { width: 700px !important }\n#slide-14 .img-slot >:is(img,video) { height: 4px !important }\n#slide-14 .img-slot >:is(img,video) { height: 600px !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
